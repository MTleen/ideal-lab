name: Deploy Best Practices Site

on:
  push:
    branches: [main]
    paths:
      - "plugins/**"
      - "site/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /ideal-lab
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/out
      - uses: actions/deploy-pages@v4
