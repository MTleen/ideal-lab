name: Deploy Best Practices Site

on:
  push:
    branches: [main]
    paths:
      - "plugins/**"
      - "site/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Render graph fallback SVG (best-effort)
        continue-on-error: true
        working-directory: .
        run: |
          if command -v npx >/dev/null 2>&1; then
            npx -p @mermaid-js/mermaid-cli@10 mmdc -i docs/skills-graph.mmd -o site/public/graphs/skills-graph-fallback.svg 2>/dev/null || true
          fi
      - run: npm install
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/out
      - uses: actions/deploy-pages@v4
